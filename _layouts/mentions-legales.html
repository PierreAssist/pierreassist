<!doctype html>
<html lang="fr">
<head>
  <meta name="color-scheme" content="light">
  <meta name="description" content="Mentions légales du site Pierre Assist.">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="icon" type="image/png" href="/assets/Favicon2.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { display:['Fraunces','serif'], sans:['"Hanken Grotesk"','sans-serif'], mono:['"IBM Plex Mono"','monospace'] },
      colors: { paper:'#F4F0E7', surface:'#FBF8F1', ink:'#1C1A15', inksoft:'#5b554c', accent:'#1f4d3f', accentdark:'#163a30', line:'#e3ddd0' },
    } } }
  </script>
  <style>
    body{ background:#F4F0E7; color:#1C1A15; }
  </style>
</head>
<body class="font-sans antialiased scroll-smooth">
  {% include header.html %}
  <main class="pt-32 pb-20 px-6 sm:px-10 lg:px-16 max-w-3xl mx-auto">
    {{ content }}
  </main>
  {% include footer.html %}

  <button id="topBtn" class="hidden fixed bottom-6 right-6 p-3 bg-accent text-paper rounded-full shadow-lg z-40" aria-label="Haut de page">&#8679;</button>
  <script>
    const btn=document.getElementById('topBtn');
    window.addEventListener('scroll',()=>btn.classList.toggle('hidden',window.scrollY<300));
    btn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
