<meta property="og:title" content="Pierre Assist · Fractional COO">
<meta property="og:description" content="Le bras droit opérationnel des créateurs en ligne. Tu décides, je rends ça réel.">
<meta property="og:image" content="https://www.pierreassist.fr/assets/linkedin-selection-site.png">
<!doctype html>
<html lang="fr">
<head>
  <meta name="color-scheme" content="light">
  <meta name="description" content="Fractional COO pour créateurs et formateurs en ligne. Je prends en charge l'opérationnel de ton business pour te libérer du quotidien et te rendre ta place de patron. À distance, partout en France.">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="icon" type="image/png" href="/assets/favicon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { display:['Fraunces','serif'], sans:['"Hanken Grotesk"','sans-serif'], mono:['"IBM Plex Mono"','monospace'] },
      colors: { paper:'#F4F0E7', surface:'#FBF8F1', ink:'#1C1A15', inksoft:'#5b554c', accent:'#1f4d3f', accentdark:'#163a30', line:'#e3ddd0', terra: '#C0674B', terralight: '#EDCDBF', sauge: '#9DB4A8', },
    } } }
  </script>

  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <style>
    body{ background:#F4F0E7; color:#1C1A15; }
    body::after{ content:"";position:fixed;inset:0;pointer-events:none;z-index:50;opacity:.04;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .rise{opacity:0;animation:rise .85s cubic-bezier(.2,.7,.2,1) forwards}
    [data-aos]{transition-timing-function:cubic-bezier(.2,.7,.2,1)}
  </style>
</head>
<body class="font-sans antialiased scroll-smooth">
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}

  <button id="topBtn" class="hidden fixed bottom-6 right-6 p-3 bg-accent text-paper rounded-full shadow-lg z-40" aria-label="Haut de page">&#8679;</button>
  <script>
    const btn=document.getElementById('topBtn');
    window.addEventListener('scroll',()=>btn.classList.toggle('hidden',window.scrollY<300));
    btn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
  </script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>AOS.init({once:true,duration:700,offset:60}));</script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
